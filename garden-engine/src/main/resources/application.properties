quarkus.application.name=garden-engine

# Default reasoning model (local, free)
quarkus.langchain4j.chat-model.provider=ollama
quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.chat-model.model-id=qwen3.6:35b-a3b
quarkus.langchain4j.ollama.chat-model.temperature=0.2
quarkus.langchain4j.ollama.timeout=120s

# Qdrant configuration
quarkus.langchain4j.qdrant.host=localhost
quarkus.langchain4j.qdrant.port=6334
quarkus.langchain4j.qdrant.collection.name=mining-fingerprints
quarkus.langchain4j.devservices.qdrant.enabled=true
