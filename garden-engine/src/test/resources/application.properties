quarkus.log.level=WARN

# Disable Ollama connection attempt in tests — MockReasoningService provides CDI beans
quarkus.langchain4j.ollama.base-url=http://localhost:1
# Disable DevServices globally except Qdrant (no Docker needed for basic tests)
quarkus.langchain4j.devservices.enabled=false
# Qdrant DevServices in tests (Podman)
quarkus.langchain4j.devservices.qdrant.enabled=true
# Qdrant collection name (required by quarkus-langchain4j-qdrant extension)
quarkus.langchain4j.qdrant.collection.name=mining-fingerprints
# Disambiguate provider when both ollama and anthropic are on classpath
quarkus.langchain4j.chat-model.provider=ollama
