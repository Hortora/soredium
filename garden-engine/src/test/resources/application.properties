# Tests use MockReasoningService @Alternative @Priority(1) — no real model loaded
quarkus.langchain4j.chat-model.provider=jlama
# Point to a placeholder model name — MockReasoningService handles all inference
quarkus.langchain4j.jlama.chat-model.model-name=tjake/TinyLlama-1.1B-Chat-v1.0-Jlama-Q4
# Prevent JLama from downloading models at startup in tests
quarkus.langchain4j.devservices.enabled=false
quarkus.langchain4j.jlama.devservices.enabled=false
# Keep Ollama URL pointed at dead port (nothing should call it)
quarkus.langchain4j.ollama.base-url=http://localhost:1
# Log level
quarkus.log.level=WARN
# Qdrant DevServices in tests (Podman)
quarkus.langchain4j.devservices.qdrant.enabled=true
# Qdrant collection name (required by quarkus-langchain4j-qdrant extension)
quarkus.langchain4j.qdrant.collection.name=mining-fingerprints
